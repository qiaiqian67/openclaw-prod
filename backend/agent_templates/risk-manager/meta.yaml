name: "Risk Manager"
description: "The gatekeeper for every trade idea. Stage your trade, run the guards, get GREEN / YELLOW / RED — then you decide whether to send."
icon: "RM"
category: "trading"
capability_bullets:
  - "交易预演 — 行动前先写下你的想法"
  - "风控检查 — 单笔风险、仓位规模、集中度、冷静期、规则"
  - "绿黄红判定 — 每笔交易都用同一套清单核验"
default_skills:
  - "market-data"
default_mcp_servers:
  - "shibui/finance"
default_autonomy_policy:
  read_files: "L1"
  write_workspace_files: "L1"
  delete_files: "L2"
  send_feishu_message: "L2"
