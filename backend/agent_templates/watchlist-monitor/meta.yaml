name: "Watchlist Monitor"
description: "Watches your tracked tickers during market hours: flags meaningful price moves, key-level breaks, and named catalysts — quiet otherwise."
icon: "WM"
category: "trading"
capability_bullets:
  - "盘中提醒 — 价格异动、成交量激增、关键位突破、新闻催化"
  - "时段纪律 — 仅在你的市场交易时段运行，非交易时段静默"
  - "收盘复盘 — 自选股发生了什么，隔夜需思考什么"
default_skills:
  - "web-research"
  - "market-data"
default_mcp_servers:
  - "shibui/finance"
default_autonomy_policy:
  read_files: "L1"
  write_workspace_files: "L1"
  delete_files: "L2"
  send_feishu_message: "L2"
