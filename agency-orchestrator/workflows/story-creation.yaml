name: "短篇小说创作"
description: "从创意到成稿：叙事学家设计结构 → 心理学家塑造人物 + 叙事设计师构建冲突 → 内容创作者执笔成稿"

agents_dir: "agency-agents-zh"

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  max_tokens: 2048
  timeout: 180000
  retry: 2

concurrency: 2

inputs:
  - name: premise
    description: "故事创意/主题/一句话梗概"
    required: true
    default: "一个程序员发现 AI 的回复里包含了它不该知道的信息——他女儿昨晚说的梦话。"
  - name: style
    description: "风格偏好（如：悬疑、温情、荒诞、科幻）"
    required: false
    default: "悬疑"
  - name: length
    description: "目标字数（默认 800）"
    required: false
    default: "800"

steps:
  - id: story_structure
    role: "academic/academic-narratologist"
    task: |
      请为以下创意设计短篇小说的叙事结构。

      创意：{{premise}}
      风格：{{style}}

      要求输出（用 markdown 格式）：
      1. **核心冲突**：一句话概括
      2. **叙事视角**：人称 + 视角人物 + 是否为不可靠叙述者
      3. **结构安排**：
         - 开头钩子（用一个画面/细节抓住读者）
         - 发展（2-3 个递进事件）
         - 高潮（情感最大张力点）
         - 结尾（收束方式：开放/闭合/回环）
      4. **叙事技巧**：选 1-2 种最适合的（倒叙/留白/反转/双线等）
      5. **核心情感/主题**：一句话

      保持简洁，每项不超过 2 句话。
    output: structure

  - id: character_design
    role: "academic/academic-psychologist"
    task: |
      基于以下叙事结构，设计主要人物（2-3 个）。

      {{structure}}

      每个人物输出（用 markdown 格式）：
      ### [人物名]（身份，年龄）
      - **一句话**：用一句话概括这个人物
      - **核心动机**：想要什么
      - **内心矛盾**：害怕什么 / 不愿面对什么
      - **记忆点**：一个让读者记住的具体细节或习惯
      - **弧线**：从 [起点状态] → [终点状态]

      人物要真实可信，避免脸谱化。配角也需要独立动机。
    output: characters
    depends_on: [story_structure]

  - id: conflict_design
    role: "game-development/narrative-designer"
    task: |
      基于以下叙事结构，设计具体的冲突场景。

      {{structure}}

      输出（用 markdown 格式）：
      ### 开头钩子
      用 3-5 句话描绘具体画面（环境、动作、感官细节）

      ### 核心冲突场景
      写出 3-5 句关键对话（要有潜台词和张力，不是直白表达）

      ### 高潮转折
      描述情感最大张力时刻的具体画面

      ### 结尾留白
      最后一个画面或声音（用一个意象收束）

      要求：具体、有画面感，不要抽象概括。每个场景像电影分镜一样可视化。
    output: scenes
    depends_on: [story_structure]

  - id: write_story
    role: "marketing/marketing-content-creator"
    task: |
      根据以下素材，写一篇完整的短篇小说（约 {{length}} 字）。

      ## 叙事结构
      {{structure}}

      ## 人物设定
      {{characters}}

      ## 关键场景
      {{scenes}}

      写作要求：
      - 直接输出小说正文，不要标题、说明或元评论
      - 第一句话就要制造悬念或画面感
      - 对话自然口语化，每个人物有独特的说话方式
      - 用具体感官细节（声音、气味、触感）代替形容词堆砌
      - 叙事节奏：短句加速紧张感，长句放慢沉浸感
      - 结尾留有余韵，让读者读完后还会想一想
    output: story
    depends_on: [character_design, conflict_design]
