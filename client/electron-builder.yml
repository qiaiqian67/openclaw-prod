appId: com.deerclaw.client
productName: DeerClaw Client
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.js
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  sign: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
# Auto-update is opt-in: the user configures `updateUrl` from the login
# screen and the renderer pushes it to the main process via
# `updater:setUrl` (which calls `autoUpdater.setFeedURL({ provider: 'generic', ... })`).
# Leaving `publish` unset keeps the packaged `app-update.yml` from baking in
# any hardcoded provider URL, so a fresh install with no configured server
# simply skips the startup update check instead of 404-ing on a dead repo.
publish: null