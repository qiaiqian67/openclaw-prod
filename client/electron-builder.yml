appId: com.deerclaw.client
productName: DeerClaw Client
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.js
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  sign: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
publish:
  provider: github
  owner: dataelement
  repo: DeerClaw
  releaseType: release